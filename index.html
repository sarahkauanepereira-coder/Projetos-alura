<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Carteirinha BibliotecaMJ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-pagina">

        <!-- Carteirinha -->
        <div class="carteirinha">
            <div class="cabecalho">
                <span class="icone-livro">📚</span>
                <h1 class="titulo-biblioteca">BibliotecaMJ</h1>
            </div>
            
            <div class="conteudo">
                <div class="foto-container">
                    <img src="minha-foto.jpeg.jpeg" alt="Foto de perfil" class="foto-perfil">
                </div>
                
                <div class="informacoes">
                    <p class="campo"><span>Nome:</span><br><strong>Sarah Kauane Pereira</strong></p>
                    <p class="campo"><span>Matrícula:</span><br><strong>20261234</strong></p>
                    <p class="campo"><span>Ano/Série:</span><br><strong>2º Ano Ensino Médio</strong></p>
                    <p class="campo"><span>Validade:</span><br><strong>12/2026</strong></p>
                </div>
            </div>
            
            <div class="rodape">
                COLÉGIO ESTADUAL PROF. MARIA JOSÉ AGUILERA • CARTEIRINHA DIGITAL
            </div>
        </div>

        <!-- Estante com fotos reais da Internet -->
        <div class="estante">
            <h2 class="titulo-estante">📚 Minha Estante</h2>
            <div class="livros-container">
                
                <!-- Livro 1: O Sol é Para Todos -->
                <div class="livro-item">
                    <img src="livro-foto.jpge.jpge" alt="Capa O Sol é para Todos" class="capa-livro">
                    <div class="livro-dados">
                        <span class="livro-titulo">O Sol é para Todos</span>
                        <span class="livro-autor">Harper Lee</span>
                    </div>
                </div>

                <!-- Livro 2: Ataque dos Titãs -->
                <div class="livro-item">
                    <img src="capa-foto.jpge.jpge.webp" alt="Capa Ataque dos Titãs" class="capa-livro">
                    <div class="livro-dados">
                        <span class="livro-titulo">Ataque dos Titãs</span>
                        <span class="livro-autor">Hajime Isayama</span>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
